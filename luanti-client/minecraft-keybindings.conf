# ─────────────────────────────────────────────────────────────────────────────
# minecraft-keybindings.conf
#
# Luanti client keybinding overrides to match Minecraft defaults.
# Applied automatically by launch.sh each time the client is launched.
#
# Minecraft → Luanti key mapping changes (only the differences are listed):
#
#   Action            Minecraft   Luanti default   This file
#   ──────────────    ─────────   ──────────────   ──────────
#   Inventory         E           I                E  ← biggest one
#   Zoom              C           Z                C
#   3rd-person view   F5          F7               F5
#   Debug overlay     F3          F5               F3
#   Screenshot        F2          F12              F2
#
# Keys that already match Minecraft (no change needed):
#   W/A/S/D  movement, Space jump, Shift sneak, Ctrl sprint,
#   Q drop, T chat, / command, 1-9 hotbar, F1 hide HUD, F11 fullscreen
#
# Fly / fast / noclip have no Minecraft equivalent:
#   K = fly toggle, J = fast mode, H = noclip  (use these or press F in creative
#   for the double-space-to-fly that VoxeLibre supports in creative mode)
# ─────────────────────────────────────────────────────────────────────────────

# E = open inventory  (Minecraft default; Luanti default is I)
keymap_inventory = KEY_E

# F = aux1 action key  (Luanti default is also KEY_E, which conflicts with inventory above)
# Remap to F — Minecraft uses F for swap-to-offhand which VoxeLibre doesn't fully support,
# so F is safe to use here as the sprint secondary trigger (primary sprint is Ctrl as in Minecraft)
keymap_aux1 = KEY_F

# C = zoom  (like OptiFine in Minecraft; Luanti default is Z)
keymap_zoom = KEY_C

# F5 = toggle 3rd-person camera  (Minecraft default; Luanti default is F7)
keymap_camera_mode = KEY_F5

# F3 = toggle debug/stats overlay  (Minecraft default; Luanti default is F5)
keymap_toggle_debug = KEY_F3

# F2 = screenshot  (Minecraft default; Luanti default is F12)
# Move chat-visibility toggle off F2 so screenshot can take its place
keymap_screenshot = KEY_F2
keymap_toggle_chat = KEY_F8
