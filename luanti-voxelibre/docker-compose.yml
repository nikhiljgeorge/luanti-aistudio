services:
  luanti:
    build:
      context: .
      dockerfile: Dockerfile
    image: luanti-voxelibre:local
    container_name: luanti-voxelibre
    restart: unless-stopped
    ports:
      - "30000:30000/udp"   # Game port — Luanti clients AND Python bot connect here
    volumes:
      - luanti_data:/config  # Entire /config persists (games, mods, worlds, config)
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'startup complete' /config/.minetest/debug.txt 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

volumes:
  luanti_data:
    driver: local
