# ── Server Identity ─────────────────────────────────────────────────────────
server_name = Luanti AI Studio
server_description = VoxeLibre + Python Control via miney
server_address = 0.0.0.0
port = 30000

# ── Access & Accounts ───────────────────────────────────────────────────────
# Allow a guest account "viewer" with no password so the Luanti client
# can join easily during development. Lock this down in production.
# miney privilege is needed by the Python bot to execute Lua via the miney mod.
# Granting it by default makes any player (including pybot) able to run code.
# Remove 'miney' from this list in production and grant it explicitly instead.
default_privs = interact, shout, miney, fly, fast, noclip, settime, teleport, bring, give, server
# teleport  → /teleport and /tp commands work
# bring     → can teleport other players to you
# give      → /give command works
# server    → required by VoxeLibre's /gamemode command (creative ↔ survival)
disallow_empty_password = false
enable_damage = true           # Must be true so players can damage/kill mobs.
                               # Players in creative mode are immune to mob damage (VoxeLibre handles this).
                               # The Python bot is invisible and never enters combat.

# Creative mode: gives all players infinite blocks and enables flying.
# This is a dev/demo server — lock down for production.
creative_mode = true

# ── Gameplay — Minecraft-matching defaults ────────────────────────────────────
enable_fire = true             # Fire spreads like Minecraft (flint-and-steel, lava)
enable_pvp = true              # PvP on by default (Minecraft default)
mcl_enable_commandblocks = true  # Command blocks usable in-world
mcl_keepInventory = true       # Don't drop items on death — kids expect this

# ── Mods ─────────────────────────────────────────────────────────────────────
# miney mod enables the Python ↔ Luanti bridge
load_mod_miney = mods/miney

# ── World Generation ─────────────────────────────────────────────────────────
mapgen_name = v7
mg_flags = caves,dungeons,light,decorations

# ── Performance (single-machine / Docker) ────────────────────────────────────
max_users = 10
server_map_save_interval = 60

# ── Logging ──────────────────────────────────────────────────────────────────
debug_log_level = action
debug_log_file = /config/.minetest/debug.txt
