# ── Server Identity ─────────────────────────────────────────────────────────
server_name = Luanti AI Studio
server_description = VoxeLibre + Python Control via miney
server_address = 0.0.0.0
port = 30000

# ── Access & Accounts ───────────────────────────────────────────────────────
# Allow a guest account "viewer" with no password so the Luanti client
# can join easily during development. Lock this down in production.
default_privs = interact, shout
disallow_empty_password = false
enable_damage = false          # God-mode on so bots never die mid-demo

# ── Mods ─────────────────────────────────────────────────────────────────────
# miney mod enables the Python ↔ Luanti bridge
load_mod_miney = mods/miney

# ── World Generation ─────────────────────────────────────────────────────────
mapgen_name = v7
mg_flags = caves,dungeons,light,decorations

# ── Performance (single-machine / Docker) ────────────────────────────────────
max_users = 10
server_map_save_interval = 60

# ── Logging ──────────────────────────────────────────────────────────────────
debug_log_level = action
debug_log_file = /config/.minetest/debug.txt
